#Development version of configuration
server:
  port: 8083

#Database Connection
spring:
  datasource:
    url: 'jdbc:mysql://localhost:3306/auth_app'
    username: "root"
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true